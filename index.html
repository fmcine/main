<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Gemini Assistant</title>

    <!-- 아이폰 전체화면 앱 구동 메타 태그 -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Gemini">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="manifest" href="manifest.json">

    <style>
        :root {
            --bg-color: #0b0b0e;
            --card-color: #16161a;
            --text-color: #ffffff;
            --accent-color: #7f56d9;
            --border-color: #2c2c35;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: calc(env(safe-area-inset-top) + 20px) 20px env(safe-area-inset-bottom);
            display: flex;
            flex-direction: column;
            height: calc(100vh - env(safe-area-inset-top) - env(safe-area-inset-bottom) - 20px);
            box-sizing: border-box;
        }

        header {
            text-align: center;
            margin-bottom: 20px;
            margin-top: 10px;
        }

        .ai-logo {
            font-size: 40px;
            margin-bottom: 8px;
            display: inline-block;
            animation: pulse 2s infinite ease-in-out;
        }

        h1 {
            font-size: 24px;
            font-weight: 700;
            margin: 0;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #a78bfa, #7f56d9);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 13px;
            color: #9ca3af;
            margin-top: 6px;
        }

        .model-badge {
            display: inline-block;
            font-size: 11px;
            color: var(--accent-color);
            border: 1px solid var(--accent-color);
            border-radius: 20px;
            padding: 2px 8px;
            margin-top: 6px;
            opacity: 0.8;
        }

        .response-container {
            flex: 1;
            background-color: var(--card-color);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 20px;
            overflow-y: auto;
            margin-bottom: 20px;
            box-shadow: inset 0 2px 8px rgba(0,0,0,0.5);
        }

        .response-text {
            font-size: 16px;
            line-height: 1.7;
            color: #e5e7eb;
            white-space: pre-wrap;
        }

        .placeholder-text {
            color: #6b7280;
            text-align: center;
            margin-top: 40px;
            font-size: 15px;
        }

        .input-group {
            display: flex;
            gap: 10px;
            background-color: var(--card-color);
            border: 1px solid var(--border-color);
            padding: 8px 8px 8px 16px;
            border-radius: 50px;
            align-items: center;
        }

        input {
            flex: 1;
            background: none;
            border: none;
            color: white;
            font-size: 16px;
            outline: none;
            padding: 8px 0;
        }

        input::placeholder {
            color: #4b5563;
        }

        button {
            background: linear-gradient(135deg, #a78bfa, #7f56d9);
            color: white;
            border: none;
            border-radius: 50px;
            width: 44px;
            height: 44px;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.1s ease;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        button:active:not(:disabled) {
            transform: scale(0.9);
        }

        .loading-dots {
            display: inline-block;
            animation: blink 1.4s infinite both;
            font-size: 24px;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.9; }
            50% { transform: scale(1.1); opacity: 1; }
        }

        @keyframes blink {
            0% { opacity: .2; }
            20% { opacity: 1; }
            100% { opacity: .2; }
        }
    </style>
</head>
<body>

    <header>
        <div class="ai-logo">&#10024;</div>
        <h1>Gemini Assistant</h1>
        <p class="subtitle">언제나 함께하는 나만의 AI 개인 비서</p>
        <span class="model-badge">llama-3.3-70b</span>
    </header>

    <div class="response-container" id="responseContainer">
        <p class="placeholder-text" id="placeholder">
            안녕하세요! 무엇이든 물어보세요.<br>
            제미나이가 친절히 답변해 드립니다.
        </p>
        <div class="response-text" id="responseText"></div>
    </div>

    <div class="input-group">
        <input
            type="text"
            id="promptInput"
            placeholder="비서에게 메시지 보내기..."
            onkeypress="handleKeyPress(event)"
        >
        <button onclick="askGemini()" id="sendBtn">&#10148;</button>
    </div>

    <script>
        // Cloudflare Workers 프록시 URL (API 키는 Worker에서 안전하게 보관)
        const WORKER_URL = "https://perplexity-proxy.fmcine.workers.dev";

        function handleKeyPress(e) {
            if (e.key === 'Enter') askGemini();
        }

        async function askGemini() {
            const input = document.getElementById('promptInput');
            const container = document.getElementById('responseContainer');
            const responseText = document.getElementById('responseText');
            const placeholder = document.getElementById('placeholder');
            const sendBtn = document.getElementById('sendBtn');
            const prompt = input.value.trim();

            if (!prompt) return;

            if (placeholder) placeholder.style.display = 'none';
            responseText.innerHTML = '<span style="color: #9ca3af;">제미나이가 답변을 준비하는 중입니다<span class="loading-dots">...</span></span>';
            input.value = '';
            sendBtn.disabled = true;

            try {
                const response = await fetch(WORKER_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt })
                });

                const data = await response.json();

                if (data.candidates && data.candidates[0].content.parts[0].text) {
                    responseText.innerText = data.candidates[0].content.parts[0].text;
                    container.scrollTop = container.scrollHeight;
                } else if (data.error) {
                    responseText.innerText = `오류: ${data.error.message}`;
                } else {
                    responseText.innerText = '답변을 생성하지 못했습니다. 잠시 후 다시 시도해 주세요.';
                }
            } catch (error) {
                console.error('Error:', error);
                responseText.innerText = '서버와 연결할 수 없습니다.\nWorker URL을 확인해 주세요.';
            } finally {
                sendBtn.disabled = false;
                input.focus();
            }
        }
    </script>

</body>
</html>
