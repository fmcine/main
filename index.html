<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Gemini Pocket Assistant</title>
    
    <!-- 아이폰 전체화면 앱 구동 메타 태그 -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="제미나이">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="manifest" href="manifest.json">

    <style>
        :root {
            --bg-color: #0b0b0e;        /* 다크 모드 배경 */
            --card-color: #16161a;      /* 입력창 및 답변창 배경 */
            --text-color: #ffffff;      /* 메인 글씨 */
            --accent-color: #7f56d9;    /* 제미나이 퍼플 포인트 */
            --border-color: #2c2c35;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: calc(env(safe-area-inset-top) + 20px) 20px env(safe-area-inset-bottom);
            display: flex;
            flex-direction: column;
            height: calc(100vh - env(safe-area-inset-top) - env(safe-area-inset-bottom) - 20px);
            box-sizing: border-box;
        }

        header {
            text-align: center;
            margin-bottom: 25px;
            margin-top: 10px;
        }

        .ai-logo {
            font-size: 40px;
            margin-bottom: 8px;
            display: inline-block;
            animation: pulse 2s infinite ease-in-out;
        }

        h1 {
            font-size: 24px;
            font-weight: 700;
            margin: 0;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #a78bfa, #7f56d9);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 13px;
            color: #9ca3af;
            margin-top: 6px;
        }

        .response-container {
            flex: 1;
            background-color: var(--card-color);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 20px;
            overflow-y: auto;
            margin-bottom: 20px;
            box-shadow: inset 0 2px 8px rgba(0,0,0,0.5);
        }

        .response-text {
            font-size: 16px;
            line-height: 1.6;
            color: #e5e7eb;
            white-space: pre-wrap; /* 줄바꿈 및 공백 유지 */
        }

        .placeholder-text {
            color: #6b7280;
            text-align: center;
            margin-top: 40px;
            font-size: 15px;
        }

        .input-group {
            display: flex;
            gap: 10px;
            background-color: var(--card-color);
            border: 1px solid var(--border-color);
            padding: 8px 8px 8px 16px;
            border-radius: 50px;
            align-items: center;
        }

        input {
            flex: 1;
            background: none;
            border: none;
            color: white;
            font-size: 16px;
            outline: none;
            padding: 8px 0;
        }

        input::placeholder {
            color: #4b5563;
        }

        button {
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: 50px;
            width: 44px;
            height: 44px;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.1s ease;
        }

        button:active {
            transform: scale(0.9);
        }

        .loading-dots {
            display: inline-block;
            animation: blink 1.4s infinite both;
            font-size: 24px;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.9; }
            50% { transform: scale(1.1); opacity: 1; }
        }

        @keyframes blink {
            0% { opacity: .2; }
            20% { opacity: 1; }
            100% { opacity: .2; }
        }
    </style>
</head>
<body>

    <header>
        <span class="ai-logo">✨</span>
        <h1>Gemini Assistant</h1>
        <div class="subtitle">언제나 함께하는 나만의 AI 개인 비서</div>
    </header>

    <!-- 대화 출력 화면 -->
    <div class="response-container" id="responseContainer">
        <div class="placeholder-text" id="placeholder">
            안녕하세요! 무엇이든 물어보세요.<br>제미나이가 친절히 답변해 드립니다.
        </div>
        <div class="response-text" id="responseText"></div>
    </div>

    <!-- 입력 공간 -->
    <div class="input-group">
        <input type="text" id="promptInput" placeholder="비서에게 메시지 보내기..." onkeypress="handleKeyPress(event)">
        <button onclick="askGemini()">➔</button>
    </div>

    <script>
        // ⚠️ 실제 본인의 Gemini API Key를 아래 큰따옴표 안에 붙여넣으세요!
        const GEMINI_API_KEY = ""; 

        function handleKeyPress(e) {
            if (e.key === 'Enter') {
                askGemini();
            }
        }

        async function askGemini() {
            const input = document.getElementById('promptInput');
            const container = document.getElementById('responseContainer');
            const responseText = document.getElementById('responseText');
            const placeholder = document.getElementById('placeholder');
            const prompt = input.value.trim();

            if (!prompt) return;

            // 기존 플레이스홀더 텍스트 숨기기
            if (placeholder) {
                placeholder.style.display = 'none';
            }

            // 생각 중 화면 표시
            responseText.innerHTML = `<span style="color: #9ca3af;">제미나이가 답변을 준비하는 중입니다<span class="loading-dots">...</span></span>`;
            input.value = '';

            try {
                // Gemini 2.5 Flash API 호출
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }]
                    })
                });

                const data = await response.json();
                
                if (data.candidates && data.candidates[0].content.parts[0].text) {
                    const reply = data.candidates[0].content.parts[0].text;
                    responseText.innerText = reply;
                    // 답변이 생성되면 스크롤을 맨 밑으로 자동 이동
                    container.scrollTop = container.scrollHeight;
                } else {
                    responseText.innerText = "답변을 생성하지 못했습니다. API 키가 올바른지 확인해 주세요.";
                }

            } catch (error) {
                console.error("API Call Error:", error);
                responseText.innerText = "통신 에러가 발생했습니다. 네트워크 연결 상태를 확인해 주세요.";
            }
        }
    </script>
</body>
</html>
